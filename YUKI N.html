<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YUKI.N> Emergency Escape Program</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #d1d1e0;
            font-family: 'DotGothic16', "MS Gothic", "Osaka-mono", monospace;
            margin: 0;
            padding: 20px 0 0 20px; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            overflow: hidden;
        }

        #console {
            font-size: 14px;
            letter-spacing: 0.05em;
        }

        .line-group {
            display: flex;
            line-height: 1.6;
            margin-bottom: 0.6em;
        }

        .prefix {
            white-space: pre;
            flex-shrink: 0;
            padding-right: 2px; /* ＞と文章が重ならないための最小間隔 */
            display: inline-block;
        }

        .content {
            display: flex;
            flex-direction: column;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 1文字分（1em）右にずらして「れ」の真下に揃える */
        .indent {
            margin-left: 1em;
        }

        .ready-row {
            margin-top: 15px;
            display: block;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 2px;
            background-color: #d1d1e0;
            margin-left: 1px;
            vertical-align: bottom;
            margin-bottom: 2px;
            animation: blink-step 1.0s steps(2, start) infinite;
        }

        @keyframes blink-step { to { visibility: hidden; } }

        /* --- グリッチ演出用CSS --- */
        .glitch-active {
            animation: glitch-anim 0.2s infinite;
            filter: contrast(500%) brightness(150%);
            overflow: hidden;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); clip-path: inset(10% 0 30% 0); }
            20% { transform: translate(-10px, 5px); clip-path: inset(40% 0 10% 0); }
            40% { transform: translate(10px, -5px); clip-path: inset(20% 0 50% 0); }
            60% { transform: translate(-5px, 10px); clip-path: inset(80% 0 5% 0); }
            80% { transform: translate(5px, -10px); clip-path: inset(5% 0 70% 0); }
            100% { transform: translate(0); }
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

<div class="noise-overlay" id="noise"></div>
<div id="console"></div>

<script>
    const script = [
        { prefix: "YUKI.N>", lines: ["これをあなたが読んでいる時、", "わたしはわたしではないだろう。"] },
        { prefix: "YUKI.N>", lines: ["このメッセージが表示されたということは、", "そこにはあなた、わたし、涼宮ハルヒ、朝比奈みくる、", "古泉一樹が存在しているはずである。"] },
        { prefix: "YUKI.N>", lines: ["それが鍵。", "あなたは解答を見つけ出した。"] },
        { prefix: "YUKI.N>", lines: ["これは緊急脱出プログラムである。"] },
        { prefix: "       ", lines: ["起動させる場合はエンターキーを、", "そうでない場合はそれ以外のキーを選択せよ。"], forceAllIndent: true },
        { prefix: "       ", lines: ["起動させた場合、", "あなたは時空修正の機会を得る。", "ただし成功は保障できない。", "また帰還の保障もできない。"], forceAllIndent: true },
        { prefix: "YUKI.N>", lines: ["このプログラムが起動するのは一度きりである。", "実行ののち、消去される。"] },
        { prefix: "YUKI.N>", lines: ["非実行が選択された場合は起動せずに消去される。"] },
        { isReady: true, text: "Ｒｅａｄｙ？" }
    ];

    const consoleElem = document.getElementById('console');
    const noise = document.getElementById('noise');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';

    async function typeText(element, text, isSlow = true) {
        for (let i = 0; i < text.length; i++) {
            element.textContent += text[i];
            element.appendChild(cursor);
            let delay = isSlow ? 120 : 60; 
            if (text[i] === '、') delay = 550;
            if (text[i] === '。') delay = 950;
            if (text[i] === ' ') delay = 0; 
            await new Promise(r => setTimeout(r, delay));
        }
    }

    async function run() {
        for (const item of script) {
            const group = document.createElement('div');
            group.className = 'line-group';
            if (item.isReady) {
                group.className = 'ready-row';
                consoleElem.appendChild(group);
                await typeText(group, item.text);
                enableInput();
                break;
            }
            const prefixSpan = document.createElement('span');
            prefixSpan.className = 'prefix';
            const contentContainer = document.createElement('span');
            contentContainer.className = 'content';
            group.appendChild(prefixSpan);
            group.appendChild(contentContainer);
            consoleElem.appendChild(group);

            await typeText(prefixSpan, item.prefix, false);

            for (let i = 0; i < item.lines.length; i++) {
                const lineSpan = document.createElement('span');
                if (i > 0 || item.forceAllIndent) lineSpan.className = 'indent';
                contentContainer.appendChild(lineSpan);
                if (i === 0 && !item.forceAllIndent) contentContainer.insertBefore(cursor, lineSpan);
                await typeText(lineSpan, item.lines[i], true);
                if (i < item.lines.length - 1) await new Promise(r => setTimeout(r, 700));
            }
            await new Promise(r => setTimeout(r, 600));
        }
    }

    function enableInput() {
        window.addEventListener('keydown', function handleKey(e) {
            window.removeEventListener('keydown', handleKey);
            
            if (e.key === 'Enter') {
                // エンター：グリッチ後に閉じる
                document.body.classList.add('glitch-active');
                noise.style.display = 'block';
                setTimeout(() => {
                    document.body.style.display = 'none';
                    window.close(); // ブラウザ設定により無効な場合は消えるだけ
                }, 1500);
            } else {
                // それ以外：即座に落ちる
                document.body.style.display = 'none';
                window.close();
            }
        });
    }

    window.onload = run;
</script>

</body>
</html>
